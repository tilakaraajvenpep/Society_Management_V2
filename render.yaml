services:
  - type: web
    name: society-management-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma db push --accept-data-loss
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: DATABASE_URL
        fromDatabase:
          name: society-management-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: society-management-db
    plan: free
    databaseName: society_management

